name: Order Service CI/CD

on:
  push:
    paths:
      - 'services/order-service/**'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Order Service Image
      run: docker build -t harshittjainn/order-service:v1 ./services/order-service

    - name: Push Order Service Image
      run: docker push harshittjainn/order-service:v1

    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/food-app
          docker pull harshittjainn/order-service:v1
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
          docker compose up -d --no-deps order-service
