name: Backend CI/CD

on:
  push:
    paths:
      - 'server/**'
      - 'package.json'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: docker build -f server/Dockerfile -t harshittjainn/backend:v4 .

    - name: Push Backend Image
      run: docker push harshittjainn/backend:v4

    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/food-app
          docker pull harshittjainn/backend:v4
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
          docker compose up -d --no-deps backend
          sleep 5
          docker exec food-app-backend node server/seed.js || true
