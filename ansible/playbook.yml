---
- name: Configure FoodFlow AI EC2 instance
  hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - curl
          - git
          - htop
          - ufw
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install K3s (Kubernetes)
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/kubectl

    - name: Copy kubectl config for ubuntu user
      shell: |
        mkdir -p /home/ubuntu/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
        chown -R ubuntu:ubuntu /home/ubuntu/.kube
      args:
        creates: /home/ubuntu/.kube/config

    - name: Create food-app directory
      file:
        path: /home/ubuntu/food-app
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Ensure security group ports are open (UFW)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - 22
        - 80
        - 443
        - 3000
        - 5000
        - 9090
        - 3000
        - 30080
        - 30000
